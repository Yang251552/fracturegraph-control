seed: 0
batch_size: 32
epochs: 50
lr: 0.0004
weight_decay: 0.00001
gradient_clip: 1.0

loss:
  edge_bce_weight: 1.0
  node_bce_weight: 0.35
  shape_iou_weight: 0.0

logging:
  wandb: true
  wandb_project: fracturegraph-control
  wandb_run_name: surrogate-lattice24-balanced
  print_every_batches: 100
  save_every: 5

checkpoint:
  dir: results/checkpoints/balanced
